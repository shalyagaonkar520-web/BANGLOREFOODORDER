<!-- Micro-interactions Script -->
<script>
        function requestLocation() {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            
            // Visual feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Requesting Access...';
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            // Simulate a browser permission request
            setTimeout(() => {
                alert("Location permission requested. In a production app, this would trigger the native browser/OS location prompt.");
                btn.innerHTML = originalContent;
                btn.classList.remove('opacity-80', 'pointer-events-none');
            }, 1500);
        }

        // Add a subtle parallax effect to the map
        document.addEventListener('mousemove', (e) => {
            const map = document.querySelector('[data-location]');
            if (!map) return;
            const moveX = (e.clientX - window.innerWidth / 2) / 100;
            const moveY = (e.clientY - window.innerHeight / 2) / 100;
            map.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
